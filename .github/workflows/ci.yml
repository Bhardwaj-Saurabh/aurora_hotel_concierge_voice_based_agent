# Offline verification gates (goal.md 4.1). Everything runs on the mock
# provider — no API keys, no network calls to model providers. A PR that
# breaks a gate does not merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pipeline/requirements.txt
            livekit/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r pipeline/requirements.txt -r livekit/requirements.txt

      - name: "Gate 1: smoke test (offline end-to-end)"
        working-directory: pipeline
        run: python smoke_test.py

      - name: "Gate 2: pipeline unit tests"
        working-directory: pipeline
        run: python -m unittest -v test_features.py

      - name: "Gate 3: eval suites (core + red team)"
        working-directory: evals
        run: python run_evals.py --suite all

      - name: "Gate 4: livekit unit tests"
        working-directory: livekit
        run: python -m unittest -v test_talk_server.py test_env_loader.py

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build talk-server image
        run: docker build -t aurora-talk-server .

      - name: "Container boots and serves /state"
        run: |
          docker run -d --rm --name aurora -p 5173:5173 aurora-talk-server
          for i in $(seq 1 15); do
            curl -fsS http://localhost:5173/state && ok=1 && break || sleep 1
          done
          docker stop aurora
          test "$ok" = "1"

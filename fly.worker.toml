# Aurora room-native agent worker (goal.md ADR-012/3.1) — a LiveKit job
# worker, not a web service: no public route, registers outbound with
# LiveKit and receives room dispatches. Must stay running continuously
# (no auto-stop) so LiveKit always has a worker to dispatch to; scale with
# `fly scale count N` for a pool, per ADR-012's "run a pool of these."
# Deploy: fly deploy -c fly.worker.toml
app = "aurora-hotel-agent-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.worker"

[[checks]]
  name = "worker-health"
  type = "tcp"
  port = 8081
  interval = "15s"
  timeout = "5s"
  grace_period = "15s"

# This block exists mainly so Fly treats the worker as an always-on process
# (it must stay running continuously so LiveKit always has somewhere to
# dispatch a room job) rather than an on-demand machine that only starts
# when something connects. The exposed port only ever serves the health
# endpoint (returns "OK"/503) — no caller-facing API, nothing sensitive.
[[services]]
  internal_port = 8081
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

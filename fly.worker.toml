# Aurora room-native agent worker (goal.md ADR-012/3.1) — a LiveKit job
# worker, not a web service: no public route, registers outbound with
# LiveKit and receives room dispatches. Must stay running continuously
# (no auto-stop) so LiveKit always has a worker to dispatch to; scale with
# `fly scale count N` for a pool, per ADR-012's "run a pool of these."
# Deploy: fly deploy -c fly.worker.toml
app = "aurora-hotel-agent-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.worker"

[[checks]]
  name = "worker-health"
  type = "tcp"
  port = 8081
  interval = "15s"
  timeout = "5s"
  grace_period = "15s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
